<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Smart Home Control</title>
    <style>
        /* =========================================
           ส่วนตกแต่งหน้าตาเว็บ (CSS)
           ========================================= */
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        h2 {
            text-align: center;
            color: #00ffff;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        p.subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 30px;
        }

        .channel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #21262d;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .channel-name {
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ดีไซน์สวิตช์ Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #484f58;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00ffff;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* =========================================
           ส่วนตกแต่งข้อมูลผู้พัฒนาระบบ
           ========================================= */
        .developer-info {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #30363d;
        }

        .developer-info h4 {
            color: #00ffff;
            margin: 0 0 10px 0;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .developer-info p {
            color: #8b949e;
            margin: 4px 0;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>SMART HOME</h2>
        <p class="subtitle">ESP8266 IoT Control Panel</p>

        <div class="channel-row">
            <span class="channel-name">💡 ช่องที่ 1 (D1)</span>
            <label class="switch">
                <input type="checkbox" id="ch1" onchange="toggleDevice('ch1')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <span class="channel-name">🔌 ช่องที่ 2 (D2)</span>
            <label class="switch">
                <input type="checkbox" id="ch2" onchange="toggleDevice('ch2')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <span class="channel-name">📺 ช่องที่ 3 (D5)</span>
            <label class="switch">
                <input type="checkbox" id="ch3" onchange="toggleDevice('ch3')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <span class="channel-name">❄️ ช่องที่ 4 (D6)</span>
            <label class="switch">
                <input type="checkbox" id="ch4" onchange="toggleDevice('ch4')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="developer-info">
            <h4>ผู้พัฒนาระบบ</h4>
            <p>นาย ชยานันท์ สายแวว</p>
            <p>แผนกอิเล็กทรอนิกส์</p>
            <p>วิทยาลัยสารพัดช่างศรีสะเกษ</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 🛑 สำคัญมาก: ใส่ Config ของคุณตรงนี้นะครับ
        const firebaseConfig = {
            apiKey: "ใส่_API_KEY_ของคุณที่นี่",
            authDomain: "โปรเจกต์ของคุณ.firebaseapp.com",
            databaseURL: "https://โปรเจกต์ของคุณ-default-rtdb.firebaseio.com",
            projectId: "รหัสโปรเจกต์ของคุณ",
            storageBucket: "โปรเจกต์ของคุณ.appspot.com",
            messagingSenderId: "รหัสผู้ส่งของคุณ",
            appId: "รหัสแอปของคุณ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ฟังก์ชันสั่งการเปิด-ปิด
        window.toggleDevice = function(channel) {
            const isChecked = document.getElementById(channel).checked;
            const state = isChecked ? 1 : 0; 
            
            set(ref(db, 'devices/' + channel), state)
                .then(() => console.log(channel + ' อัปเดตสถานะเป็น: ' + state))
                .catch((error) => console.error("เกิดข้อผิดพลาด: ", error));
        };

        // ฟังก์ชันดึงสถานะล่าสุด
        function listenToDevice(channel) {
            const deviceRef = ref(db, 'devices/' + channel);
            onValue(deviceRef, (snapshot) => {
                const data = snapshot.val();
                if (data !== null) {
                    document.getElementById(channel).checked = (data === 1);
                }
            });
        }

        listenToDevice('ch1');
        listenToDevice('ch2');
        listenToDevice('ch3');
        listenToDevice('ch4');
    </script>

</body>
</html>
